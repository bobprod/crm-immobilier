# Version simplifiée pour tests rapides en développement
services:
  # Base de données PostgreSQL pour les tests
  db-test:
    image: postgres:15-alpine
    container_name: crm-db-test-dev
    environment:
      POSTGRES_DB: crm_test
      POSTGRES_USER: crm_test_user
      POSTGRES_PASSWORD: crm_test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_test_user -d crm_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-test-network

  # Backend NestJS en mode dev (sans build)
  backend-test:
    image: node:18-alpine
    container_name: crm-backend-test-dev
    working_dir: /app
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://crm_test_user:crm_test_password@db-test:5432/crm_test
      JWT_SECRET: test_jwt_secret_key_for_testing_only
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_for_testing_only
      PORT: 3001
    ports:
      - "3002:3001"
    depends_on:
      db-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    command: >
      sh -c "
        echo '📦 Installing dependencies...' &&
        npm install &&
        echo '🔧 Generating Prisma Client...' &&
        npx prisma generate &&
        echo '🗄️ Pushing database schema...' &&
        npx prisma db push --skip-generate &&
        echo '✅ Starting development server...' &&
        npm run start:dev
      "
    networks:
      - crm-test-network

networks:
  crm-test-network:
    driver: bridge

volumes:
  postgres_test_data:
    driver: local
